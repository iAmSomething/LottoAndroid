name: BO005 Readiness Routine

on:
  schedule:
    # Monday 11:30 KST
    - cron: "30 2 * * 1"
  workflow_dispatch:

concurrency:
  group: bo005-readiness-routine-${{ github.ref }}
  cancel-in-progress: true

jobs:
  readiness-check:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install adb
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y adb

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@13.1.0

      - name: Run BO-005 readiness routine
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_TESTER_GROUP_ALIAS: ${{ secrets.FIREBASE_TESTER_GROUP_ALIAS }}
          FIREBASE_SERVICE_ACCOUNT_JSON_BASE64: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON_BASE64 }}
        run: |
          set -euo pipefail
          ROUTINE_REPORT="docs/assets/distribution/bo005_readiness_routine_ci_${GITHUB_RUN_ID}.md"
          RUNNER_REPORT="docs/assets/distribution/bo005_when_physical_ready_ci_${GITHUB_RUN_ID}.md"
          CHAIN_REPORT="docs/assets/distribution/firebase_physical_pass_chain_bo005_ci_${GITHUB_RUN_ID}.md"

          ./scripts/run-bo005-readiness-routine-check.sh \
            --date-tag "$(date +%F)" \
            --report-file "$ROUTINE_REPORT" \
            --runner-report "$RUNNER_REPORT" \
            --chain-report "$CHAIN_REPORT" \
            --poll-interval 1 \
            --timeout-seconds 1

      - name: Upload BO-005 routine artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bo005-readiness-routine-${{ github.run_id }}
          path: |
            docs/assets/distribution/bo005_readiness_routine_ci_${{ github.run_id }}.md
            docs/assets/distribution/bo005_when_physical_ready_ci_${{ github.run_id }}.md
            docs/assets/distribution/firebase_physical_pass_chain_bo005_ci_${{ github.run_id }}.md
